<svg xmlns="http://www.w3.org/2000/svg" width="320" height="64" viewBox="0 0 320 64" role="img" aria-labelledby="title desc">
  <title id="title">Clap Money Trading Logo</title>
  <desc id="desc">CMT logo mark with candlestick bars and brand text</desc>
  <defs>
    <linearGradient id="cmtGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#0b3f6d" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="320" height="64" rx="12" fill="#ffffff" />
  <g transform="translate(12,8)">
    <rect x="0" y="0" width="48" height="48" rx="10" fill="url(#cmtGrad)" />
    <g fill="#ffffff">
      <rect x="11" y="12" width="4" height="24" rx="2" />
      <rect x="22" y="8" width="4" height="30" rx="2" />
      <rect x="33" y="15" width="4" height="18" rx="2" />
    </g>
  </g>
  <text x="70" y="30" font-size="18" font-family="Montserrat,Segoe UI,sans-serif" font-weight="700" fill="#0f172a">Clap Money Trading</text>
  <text x="70" y="47" font-size="11" font-family="Montserrat,Segoe UI,sans-serif" font-weight="500" fill="#334155">Student Learning Portal</text>
</svg>
